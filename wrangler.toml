# Cloudflare Pages config.
#
# The CONFIG_KV binding is what `functions/_lib/config.js` reads/writes.
#
# Bind it through the Cloudflare Pages dashboard:
#   Workers & Pages -> your Pages project -> Settings -> Functions
#   -> KV namespace bindings -> Add binding
#     Variable name: CONFIG_KV
#     KV namespace:  (create one under Workers & Pages -> KV, then select it here)
#
# Doing it via the dashboard means you don't need to commit a KV namespace ID.

name = "betzoo-dashboard"
compatibility_date = "2024-09-01"
pages_build_output_dir = "public"
